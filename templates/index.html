<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SolutionsDesk — Feature Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --accent:#2563eb;--accent-hover:#1d4ed8;--accent-soft:#eff6ff;--accent-ring:rgba(37,99,235,.18);
  --ui-font:'Plus Jakarta Sans',system-ui,sans-serif;
  --ink:#0f172a;--ink-2:#475569;--ink-3:#64748b;--faint:#94a3b8;
  --line:#e9edf3;--line-2:#eef2f6;--bg:#ffffff;--canvas:#f7f9fc;
}
*{box-sizing:border-box;}
html,body{height:100%;margin:0;}
body{font-family:var(--ui-font);color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}

/* ── Shell ── */
.sd-app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.sd-header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  height:48px;padding:0 14px;background:var(--bg);border-bottom:1px solid var(--line);
}
.sd-header-left{display:flex;align-items:center;gap:8px;}
.sd-side-toggle{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--ink-3);transition:.15s;}
.sd-side-toggle:hover{background:var(--canvas);color:var(--ink);}
.sd-brand{display:flex;align-items:center;gap:9px;}
.sd-logo{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:linear-gradient(150deg,var(--accent),var(--accent-hover));box-shadow:0 2px 6px var(--accent-ring);flex-shrink:0;}
.sd-brand-name{font-size:14.5px;font-weight:700;letter-spacing:-.01em;line-height:1;}
.sd-brand-name b{font-weight:800;color:var(--accent);}
.sd-brand-tag{font-size:9px;font-weight:700;letter-spacing:.13em;color:var(--faint);margin-top:3px;}
.sd-body{flex:1;display:flex;min-height:0;}

/* ── Sidebar ── */
.sd-sidebar{flex-shrink:0;background:var(--bg);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;position:relative;}
.sd-width-resize{position:absolute;top:0;right:0;width:6px;height:100%;cursor:col-resize;z-index:5;}
.sd-width-resize::after{content:'';position:absolute;right:0;top:0;width:2px;height:100%;background:transparent;transition:background .12s;}
.sd-width-resize:hover::after{background:var(--accent);}
.sd-side-top{padding:12px 8px 6px;display:flex;flex-direction:column;gap:2px;}
.sd-newchat,.sd-clear{width:100%;display:flex;align-items:center;gap:11px;text-align:left;height:38px;padding:0 9px;border-radius:9px;background:transparent;transition:background .14s;}
.sd-newchat{font-size:14px;font-weight:600;color:var(--ink);}
.sd-clear{font-size:13.5px;font-weight:500;color:var(--ink-2);}
.sd-newchat:hover,.sd-clear:hover{background:var(--canvas);}
.sd-nc-ic{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;color:var(--accent);flex-shrink:0;}
.sd-ic-plain{width:24px;height:24px;display:grid;place-items:center;color:var(--ink-3);flex-shrink:0;}
.sd-side-scroll{flex:1;overflow-y:auto;padding:6px 8px 12px;min-height:0;}
.sd-side-scroll::-webkit-scrollbar{width:8px;}
.sd-side-scroll::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:8px;border:2px solid var(--bg);}
.sd-group{margin-top:14px;}
.sd-group-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:0 8px 6px;}
.sd-empty-hint{font-size:13px;color:var(--faint);padding:2px 8px;}
.sd-chatrow{width:100%;display:flex;align-items:center;gap:9px;text-align:left;padding:8px 9px;border-radius:8px;font-size:13.5px;color:var(--ink-2);transition:.12s;cursor:pointer;position:relative;}
.sd-chatrow:hover{background:var(--canvas);}
.sd-chatrow.is-active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.sd-chatrow.is-active svg{stroke:var(--accent)!important;}
.sd-chatrow-title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.sd-chatdel{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;flex-shrink:0;color:var(--faint);opacity:0;transition:opacity .12s,background .12s,color .12s;}
.sd-chatrow:hover .sd-chatdel{opacity:1;}
.sd-chatdel:hover{background:#fee2e2;color:#dc2626;}

/* ── Resources ── */
.sd-resources{flex-shrink:0;position:relative;border-top:1px solid var(--line);padding:0 8px 12px;background:var(--bg);display:flex;flex-direction:column;}
.sd-res-resize{height:13px;margin:0 -8px;display:flex;align-items:center;justify-content:center;cursor:row-resize;flex-shrink:0;}
.sd-res-grip{width:34px;height:3px;border-radius:3px;background:#cbd5e1;transition:background .12s,width .12s;}
.sd-res-resize:hover .sd-res-grip{background:var(--accent);width:44px;}
.sd-res-head{padding:2px 6px 8px;flex-shrink:0;}
.sd-res-list{flex:1;display:flex;flex-direction:column;gap:2px;overflow-y:auto;min-height:0;}
.sd-res{display:flex;align-items:center;gap:10px;text-align:left;padding:8px;border-radius:9px;transition:.12s;width:100%;}
.sd-res:hover{background:var(--canvas);}
.sd-res-ico{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;background:var(--accent-soft);flex-shrink:0;}
.sd-res-text{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1;}
.sd-res-title{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sd-res-meta{font-size:11px;color:var(--faint);}

/* ── Mini rail ── */
.sd-rail{display:flex;width:46px;flex-shrink:0;flex-direction:column;align-items:center;gap:4px;padding:10px 0;background:var(--bg);border-right:1px solid var(--line);}
.sd-railbtn{position:relative;width:36px;height:36px;border-radius:9px;display:grid;place-items:center;color:var(--ink-2);transition:background .14s,color .14s;}
.sd-railbtn:hover{background:var(--accent-soft);color:var(--accent);}
.sd-railbtn::after{content:attr(data-tip);position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);white-space:nowrap;background:#1e293b;color:#fff;font-size:12.5px;font-weight:600;padding:6px 11px;border-radius:8px;opacity:0;pointer-events:none;transition:opacity .12s;box-shadow:0 6px 18px rgba(15,23,42,.22);z-index:60;}
.sd-railbtn:hover::after{opacity:1;}

/* ── Main ── */
.sd-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--canvas);}
.sd-scroll{flex:1;overflow-y:auto;min-height:0;}
.sd-scroll::-webkit-scrollbar{width:10px;}
.sd-scroll::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:8px;border:3px solid var(--canvas);}

/* ── Empty state ── */
.sd-empty{max-width:640px;margin:0 auto;padding:64px 28px 40px;text-align:center;display:flex;flex-direction:column;align-items:center;}
.sd-empty-h{font-size:20px;font-weight:700;letter-spacing:-.02em;margin:0 0 7px;color:var(--ink);}
.sd-empty-sub{font-size:13.5px;line-height:1.5;color:var(--ink-3);margin:0 0 22px;max-width:430px;}
.sd-chips{display:flex;flex-direction:column;gap:8px;width:100%;max-width:420px;}
.sd-chip{text-align:left;padding:11px 14px;border-radius:10px;background:var(--bg);border:1px solid var(--line);font-size:13px;font-weight:500;color:var(--ink-2);transition:.15s;}
.sd-chip:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 2px 10px var(--accent-ring);transform:translateY(-1px);}

/* ── Thread ── */
.sd-thread{max-width:720px;margin:0 auto;padding:22px 28px 24px;}
.sd-thread-head{padding-bottom:16px;margin-bottom:4px;border-bottom:1px solid var(--line-2);}
.sd-thread-title{font-size:13px;font-weight:700;color:var(--ink-2);}
.sd-msg{display:flex;margin-top:20px;}
.sd-msg-user{justify-content:flex-end;}
.sd-bubble-user{max-width:78%;background:var(--accent);color:#fff;padding:11px 15px;border-radius:15px 15px 4px 15px;font-size:13.5px;line-height:1.5;box-shadow:0 1px 2px var(--accent-ring);}
.sd-msg-ai{gap:13px;}
.sd-ai-avatar{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;background:linear-gradient(150deg,var(--accent),var(--accent-hover));box-shadow:0 1px 4px var(--accent-ring);}
.sd-ai-body{flex:1;min-width:0;padding-top:3px;}
.sd-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 12px;border-radius:999px;font-size:12.5px;font-weight:700;margin-bottom:12px;white-space:nowrap;}
.sd-badge-dot{width:7px;height:7px;border-radius:50%;}
.sd-p{font-size:13.5px;line-height:1.6;color:var(--ink);margin:0 0 13px;text-wrap:pretty;}
.sd-listwrap{margin:0 0 14px;}
.sd-list-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:8px;}
/* ── Source-colored cited items ───────────────────────────── */
.sd-citedwrap{margin:0 0 16px;}
.sd-cite-item{display:flex;flex-direction:column;gap:7px;
  padding:9px 12px;margin-bottom:7px;border-radius:8px;border-left:3px solid transparent;
  font-size:13px;line-height:1.5;color:var(--ink-2);}
.sd-cite-text{width:100%;}
.sd-cite-head{width:100%;font-weight:700;color:var(--ink);}
.sd-cite-points{width:100%;list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:5px;}
.sd-cite-points li{position:relative;padding-left:15px;line-height:1.45;}
.sd-cite-points li::before{content:'';position:absolute;left:2px;top:8px;width:5px;height:5px;
  border-radius:50%;background:currentColor;opacity:.5;}
.sd-src-feature{background:#ecfdf5;border-left-color:#10b981;}   /* green = feature sheet */
.sd-src-proposal{background:#eff6ff;border-left-color:#3b82f6;}  /* blue  = proposal docs */
.sd-src-llm{background:#fffbeb;border-left-color:#f59e0b;}       /* amber = LLM knowledge */
.sd-note{margin-top:4px;}
/* ── Feedback (thumbs up/down) ── */
.sd-fb{display:flex;align-items:center;gap:6px;margin-top:10px;}
.sd-fb-btn{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:8px;
  color:var(--faint);transition:.13s;}
.sd-fb-btn:hover{background:var(--accent-ring);color:var(--accent);}
.sd-fb-btn.sd-fb-down:hover{background:#fee2e2;color:#dc2626;}
.sd-fb-done{font-size:12px;color:var(--faint);font-weight:500;}
.sd-fb-form{width:100%;margin-top:10px;display:flex;flex-direction:column;gap:8px;}
.sd-fb-text{width:100%;min-height:64px;resize:vertical;border:1px solid var(--line);border-radius:9px;
  padding:9px 11px;font-family:inherit;font-size:13px;color:var(--ink);background:var(--bg);outline:none;}
.sd-fb-text:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring);}
.sd-fb-actions{display:flex;gap:8px;justify-content:flex-end;}
.sd-fb-cancel,.sd-fb-submit{height:32px;padding:0 14px;border-radius:8px;font-size:12.5px;font-weight:600;transition:.13s;}
.sd-fb-cancel{background:var(--line-2);color:var(--ink-2);}
.sd-fb-cancel:hover{background:var(--line);}
.sd-fb-submit{background:var(--accent);color:#fff;}
.sd-fb-submit:hover{background:var(--accent-hover);}
.sd-cite-chip{align-self:flex-end;max-width:100%;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:6px;background:rgba(0,0,0,.06);color:#475569;text-decoration:none;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sd-cite-link:hover{background:rgba(0,0,0,.13);text-decoration:underline;}
.sd-list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:9px;}
.sd-list li{display:flex;gap:11px;font-size:13px;line-height:1.5;color:var(--ink-2);align-items:flex-start;}
.sd-li-mark{width:6px;height:6px;border-radius:50%;background:var(--accent);margin-top:8px;flex-shrink:0;}
.sd-sources{margin-top:4px;padding-top:14px;border-top:1px solid var(--line-2);}
.sd-src-title{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin-bottom:9px;}
.sd-src-row{display:flex;flex-wrap:wrap;gap:8px;}
.sd-src{display:inline-flex;align-items:center;gap:7px;padding:6px 11px;border-radius:8px;background:var(--bg);border:1px solid var(--line);font-size:12.5px;font-weight:600;color:var(--ink-2);}
.sd-src em{font-style:normal;color:var(--faint);font-weight:500;}
.sd-src-meta-link{font-style:normal;color:var(--accent);font-weight:500;text-decoration:none;border-bottom:1px dotted var(--accent);cursor:pointer;}
.sd-src-meta-link:hover{color:var(--accent-hover);border-bottom-style:solid;}

/* ── Typing ── */
.sd-typing{display:flex;gap:5px;padding:8px 0;}
.sd-typing span{width:7px;height:7px;border-radius:50%;background:var(--faint);animation:sd-bounce 1.2s infinite ease-in-out;}
.sd-typing span:nth-child(2){animation-delay:.18s;}
.sd-typing span:nth-child(3){animation-delay:.36s;}
@keyframes sd-bounce{0%,80%,100%{transform:translateY(0);opacity:.5;}40%{transform:translateY(-5px);opacity:1;}}

/* ── Composer ── */
.sd-composer-wrap{flex-shrink:0;padding:12px 28px 14px;background:linear-gradient(to top,var(--canvas) 70%,transparent);}
.sd-composer{max-width:720px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--bg);border:1px solid var(--line);border-radius:13px;padding:6px;box-shadow:0 2px 12px rgba(15,23,42,.05);transition:border-color .15s,box-shadow .15s;}
.sd-composer:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-ring);}
.sd-input{flex:1;border:none;outline:none;resize:none;background:transparent;font-family:inherit;font-size:13.5px;line-height:1.5;color:var(--ink);padding:8px 6px 8px 10px;max-height:150px;}
.sd-input::placeholder{color:var(--faint);}
.sd-send{display:flex;align-items:center;gap:6px;height:36px;padding:0 14px;border-radius:10px;background:var(--accent);color:#fff;font-size:13.5px;font-weight:600;transition:.15s;flex-shrink:0;}
.sd-send:hover:not(:disabled){background:var(--accent-hover);}
.sd-send:disabled{opacity:.45;cursor:not-allowed;}
.sd-lang{height:36px;min-width:36px;padding:0 9px;border-radius:10px;background:var(--accent-ring);
  color:var(--accent);font-size:11px;font-weight:700;flex-shrink:0;transition:.15s;}
.sd-lang:hover{background:var(--line);color:var(--ink);}
.sd-mic{display:flex;align-items:center;justify-content:center;height:36px;width:36px;border-radius:10px;
  background:var(--bg);border:1px solid var(--line);color:var(--ink-2);flex-shrink:0;transition:.15s;}
.sd-mic:hover{background:var(--accent-ring);color:var(--accent);border-color:var(--accent);}
.sd-mic.sd-mic-on{background:#fee2e2;border-color:#ef4444;color:#dc2626;animation:sd-mic-pulse 1.2s infinite;}
@keyframes sd-mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.45);}50%{box-shadow:0 0 0 6px rgba(239,68,68,0);}}
.sd-send-group{position:relative;display:flex;align-items:flex-end;gap:4px;flex-shrink:0;}
.sd-caret{display:flex;align-items:center;gap:5px;height:36px;padding:0 10px;border-radius:10px;
  background:var(--accent);color:#fff;font-size:11px;font-weight:700;letter-spacing:.04em;transition:.15s;}
.sd-caret:hover{background:var(--accent-hover);}
.sd-mode-menu{position:absolute;bottom:44px;right:0;background:var(--bg);border:1px solid var(--line);
  border-radius:11px;box-shadow:0 8px 28px rgba(15,23,42,.16);padding:6px;min-width:236px;z-index:60;}
.sd-mode-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border-radius:8px;
  font-size:13px;font-weight:600;color:var(--ink-2);text-align:left;transition:.12s;}
.sd-mode-item:hover{background:var(--accent-ring);color:var(--accent);}
.sd-mode-item em{font-style:normal;color:var(--faint);font-weight:500;}
.sd-mode-item.sd-mode-active{background:var(--accent-ring);color:var(--accent);}
.sd-composer-hint{max-width:720px;margin:8px auto 0;text-align:center;font-size:11px;color:var(--faint);transition:color .15s;}
.sd-composer-hint.sd-listening{color:#dc2626;font-weight:600;}
.sd-composer-hint.sd-listening::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;
  background:#dc2626;margin-right:6px;vertical-align:middle;animation:sd-mic-pulse 1.2s infinite;}

/* ── Toast ── */
.sd-toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);z-index:50;background:var(--ink);color:#fff;padding:11px 18px;border-radius:11px;font-size:13.5px;font-weight:500;box-shadow:0 8px 28px rgba(15,23,42,.28);animation:sd-pop .25s ease;}
@keyframes sd-pop{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}

@media(max-width:860px){.sd-sidebar{display:none;}}
</style>
</head>
<body>
<div class="sd-app">
  <header class="sd-header">
    <div class="sd-header-left">
      <button class="sd-side-toggle" id="sideToggle" title="Toggle sidebar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg>
      </button>
      <div class="sd-brand">
        <div class="sd-logo">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 13.5 7-6.5 7 6.5"/><path d="m5 18 7-6.5 7 6.5"/></svg>
        </div>
        <div>
          <div class="sd-brand-name">Solutions<b>Desk</b></div>
          <div class="sd-brand-tag">FEATURE INTELLIGENCE</div>
        </div>
      </div>
    </div>
    <div></div>
  </header>

  <div class="sd-body">
    <div id="sidebarMount"></div>
    <main class="sd-main">
      <div class="sd-scroll" id="mainScroll"></div>
      <div class="sd-composer-wrap">
        <div class="sd-composer">
          <textarea class="sd-input" id="composerTA" rows="1"
            placeholder="Ask about a feature, a client request, or a product capability…"></textarea>
          <button class="sd-lang" id="langToggle" title="Speech language — click to switch English / Hindi">EN</button>
          <button class="sd-mic" id="micBtn" title="Speak your question">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
          </button>
          <div class="sd-send-group">
            <button class="sd-send" id="sendBtn" disabled>
              <span>Ask</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
            <button class="sd-caret" id="modeCaret" title="Modes">
              <span>MODES</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
            </button>
            <div class="sd-mode-menu" id="modeMenu" hidden>
              <button class="sd-mode-item" id="onlineModeBtn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/></svg>
                <span>Online <em>· Voice window</em></span>
              </button>
            </div>
          </div>
        </div>
        <div class="sd-composer-hint">SolutionsDesk answers from the live feature catalog — verify before committing to a client.</div>
      </div>
    </main>
  </div>
</div>

<script>
// ── Icons ──────────────────────────────────────────────────────────────────────
const I = {
  plus:    '<path d="M12 5v14M5 12h14"/>',
  trash:   '<path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/>',
  chat:    '<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  sheet:   '<rect x="4" y="3" width="16" height="18" rx="2"/><path d="M4 9h16M4 15h16M10 3v18"/>',
  doc:     '<path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5M9 13h6M9 17h6"/>',
  link:    '<path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/>',
  x:       '<path d="M18 6 6 18M6 6l12 12"/>',

  logo:    '<path d="m5 13.5 7-6.5 7 6.5"/><path d="m5 18 7-6.5 7 6.5"/>',
};
const ico = (name, sz=16, sw=1.6, col='currentColor') =>
  `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${I[name]||''}</svg>`;

// ── Data ───────────────────────────────────────────────────────────────────────
const RESOURCES = [
  { id:'r1', title:'CPL Feature Catalogue',   meta:'XLSX', icon:'sheet' },
  { id:'r2', title:'XSWIFT Feature Catalogue',meta:'XLSX', icon:'sheet' },
];

const CHIPS = [
  'Do we have this feature ready with us?',
  'The client is asking for this solution — do we have it?',
  'What does CPL offer for gate management?',
  'What XSWIFT features cover driver safety?',
];

const TONE = {
  green: { bg:'#ecfdf5', fg:'#047857', dot:'#10b981' },
  amber: { bg:'#fffbeb', fg:'#b45309', dot:'#f59e0b' },
  blue:  { bg:'#eff6ff', fg:'#1d4ed8', dot:'#3b82f6' },
};

// ── State ──────────────────────────────────────────────────────────────────────
const STORE_KEY = 'sd_v2';
let UID = Date.now(), toastTimer = null;
const uid = () => 'c' + (++UID);

const S = { chats:[], activeId:null, draft:'', busy:false, collapsed:false, resHeight:208, sideWidth:288 };

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(STORE_KEY) || '{}');
    if (Array.isArray(s.chats))           S.chats     = s.chats;
    if (typeof s.sideWidth === 'number')  S.sideWidth = s.sideWidth;
    if (typeof s.resHeight === 'number')  S.resHeight = s.resHeight;
    if (typeof s.collapsed === 'boolean') S.collapsed = s.collapsed;
  } catch(e) {}
}
function persist() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify({chats:S.chats,sideWidth:S.sideWidth,resHeight:S.resHeight,collapsed:S.collapsed})); } catch(e) {}
}

// ── Utils ──────────────────────────────────────────────────────────────────────
const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function blocksToText(blocks) {
  return (blocks||[]).map(b =>
      b.type==='p'      ? b.text
    : b.type==='note'   ? 'Note: '+(b.text||'')
    : b.type==='cited'  ? (b.title?b.title+':\n':'')+(b.items||[]).map(it=>(it.points&&it.points.length)?((it.text?it.text+': ':'')+it.points.join('; ')):it.text).join('\n')
    : b.type==='list'   ? (b.title?b.title+':\n':'')+(b.items||[]).join('\n')
    : b.type==='sources'? (b.items||[]).map(s=>s.title).join(', ')
    : ''
  ).filter(Boolean).join('\n\n');
}

    <button class="sd-railbtn" data-tip="New chat"    id="rNew">${ico('compose',17)}</button>
    <button class="sd-railbtn" data-tip="Search chats" id="rSearch">${ico('search',17)}</button>
    <button class="sd-railbtn" data-tip="Recent chats" id="rRecent">${ico('chat',17)}</button>
  </nav>`;
}

function sidebarHTML() {
  const rows = !S.chats.length
    ? '<div class="sd-empty-hint">No conversations yet</div>'

function emptyHTML() {
  return `<div class="sd-empty">
    <h2 class="sd-empty-h">Ask anything about our features</h2>
    <p class="sd-empty-sub">Grounded in the live CPL and XSWIFT feature catalogs — every answer cites a Feature ID.</p>
    <div class="sd-chips">${CHIPS.map(c=>`<button class="sd-chip" data-chip="${esc(c)}">${esc(c)}</button>`).join('')}</div>
  </div>`;
}

function threadHTML(chat) {
  return `<div class="sd-thread">
    <div class="sd-thread-head"><span class="sd-thread-title">${esc(chat.title)}</span></div>
    ${(chat.messages||[]).map((m,i)=>msgHTML(m,i)).join('')}
  </div>`;
}

function msgHTML(m, i) {
  if (m.role==='user') return `<div class="sd-msg sd-msg-user"><div class="sd-bubble-user">${esc(m.content||m.text||'')}</div></div>`;
  const hasBlocks = m.blocks && m.blocks.length;
  const body = hasBlocks ? m.blocks.map(blockHTML).join('')
             : (m.streaming ? `<div class="sd-typing"><span></span><span></span><span></span></div>` : '');
  const fb = m.streaming ? '' : feedbackHTML(m,i);
  return `<div class="sd-msg sd-msg-ai">
    <div class="sd-ai-avatar">${ico('logo',15,2.2,'#fff')}</div>
    <div class="sd-ai-body">${m.badge?badgeHTML(m.badge):''}${body}${fb}</div>
  </div>`;
}

function feedbackHTML(m, i) {
  const up   = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a2.5 2.5 0 0 1 3 3z"/></svg>`;
  const down = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 14V2"/><path d="M9 18.12 10 14H4.17a2 2 0 0 1-1.92-2.56l2.33-8A2 2 0 0 1 6.5 2H20a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-2.76a2 2 0 0 0-1.79 1.11L12 22a2.5 2.5 0 0 1-3-3z"/></svg>`;
  if (m.feedback==='up')   return `<div class="sd-fb"><span class="sd-fb-done">Thanks for the feedback!</span></div>`;
  if (m.feedback==='down') return `<div class="sd-fb"><span class="sd-fb-done">Thanks — we'll use your note to improve.</span></div>`;
  return `<div class="sd-fb" data-midx="${i}">
    <button class="sd-fb-btn sd-fb-up" data-midx="${i}" title="Helpful">${up}</button>
    <button class="sd-fb-btn sd-fb-down" data-midx="${i}" title="Not helpful">${down}</button>
  </div>`;
}

function badgeHTML(b) {
  const t = TONE[b.tone]||TONE.blue;
  return `<span class="sd-badge" style="background:${t.bg};color:${t.fg}"><span class="sd-badge-dot" style="background:${t.dot}"></span>${esc(b.label)}</span>`;
}

function blockHTML(b) {
  if (b.type==='p') return `<p class="sd-p">${esc(b.text||'')}</p>`;
  if (b.type==='note') {
    return `<div class="sd-cite-item sd-src-llm sd-note"><span class="sd-cite-text"><strong>Note:</strong> ${esc(b.text||'')}</span><span class="sd-cite-chip">Model Knowledge</span></div>`;
  }
  if (b.type==='cited') {
    const rows=(b.items||[]).map(it=>{
      const cls = it.src==='proposal' ? 'sd-src-proposal' : it.src==='llm' ? 'sd-src-llm' : 'sd-src-feature';
      let chip='';
      if (it.ref) {
        chip = it.href
          ? `<a class="sd-cite-chip sd-cite-link" href="${it.href}" target="_blank" title="Open source">${esc(it.ref)}</a>`
          : `<span class="sd-cite-chip">${esc(it.ref)}</span>`;
      }
      const body = (it.points && it.points.length)
        ? `${it.text?`<div class="sd-cite-head">${esc(it.text)}</div>`:''}<ul class="sd-cite-points">${it.points.map(p=>`<li>${esc(p)}</li>`).join('')}</ul>`
        : `<span class="sd-cite-text">${esc(it.text||'')}</span>`;
      return `<div class="sd-cite-item ${cls}">${body}${chip}</div>`;
    }).join('');
    return `<div class="sd-citedwrap">${b.title?`<div class="sd-list-title">${esc(b.title)}</div>`:''}${rows}</div>`;
  }
  if (b.type==='list') {
    const items=(b.items||[]).map(it=>`<li><span class="sd-li-mark"></span>${esc(it)}</li>`).join('');
    return `<div class="sd-listwrap">${b.title?`<div class="sd-list-title">${esc(b.title)}</div>`:''}<ul class="sd-list">${items}</ul></div>`;
  }
  if (b.type==='sources') {
    const srcs=(b.items||[]).map(s=>{const m=s.meta||'';const slug=m.trim().toUpperCase();const metaHtml=slug?`<a class="sd-src-meta-link" href="/api/catalog-file/${slug}" target="_blank" title="Open ${m} catalog">${esc(m)}</a>`:'';return `<span class="sd-src">${ico('doc',12,1.6,'#64748b')} ${esc(s.title)}${metaHtml}</span>`;}).join('');
    return `<div class="sd-sources">${b.title?`<div class="sd-src-title">${esc(b.title)}</div>`:''}<div class="sd-src-row">${srcs}</div></div>`;
  }
  return '';
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSidebar() {
  const m = document.getElementById('sidebarMount');
  if (!m) return;
  m.innerHTML = S.collapsed ? miniRailHTML() : sidebarHTML();
  S.collapsed ? bindRail() : bindSidebar();
}
function renderMain() {
  const scroll = document.getElementById('mainScroll');
  if (!scroll) return;
  const chat = S.chats.find(c=>c.id===S.activeId);
  if (!chat) { scroll.innerHTML = emptyHTML(); bindChips(); }
  else {
    scroll.innerHTML = threadHTML(chat);
    const last = chat.messages && chat.messages[chat.messages.length-1];
    const streamingAI = last && last.role==='assistant' && last.streaming;
    if (S.busy && !streamingAI) addTyping();   // streaming msg shows its own indicator inline
  }
  syncComposer();
}
function renderAll() { renderSidebar(); renderMain(); }

function addTyping() {
  const t = document.querySelector('.sd-thread');
  if (!t) return;
  const d = document.createElement('div');
  d.className='sd-msg sd-msg-ai'; d.id='sdTyping';
  d.innerHTML=`<div class="sd-ai-avatar">${ico('logo',15,2.2,'#fff')}</div><div class="sd-ai-body"><div class="sd-typing"><span></span><span></span><span></span></div></div>`;
  t.appendChild(d);
}
function syncComposer() {
  const ta=document.getElementById('composerTA'), btn=document.getElementById('sendBtn');
  if (ta){ta.value=S.draft;ta.style.height='auto';if(S.draft)ta.style.height=Math.min(ta.scrollHeight,150)+'px';}
  if (btn) btn.disabled=S.busy||!S.draft.trim();
}
function scrollBottom() { const el=document.getElementById('mainScroll'); if(el) el.scrollTop=el.scrollHeight; }

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  if (toastTimer) clearTimeout(toastTimer);
  let el=document.getElementById('sdToast');
  if (!el){el=document.createElement('div');el.id='sdToast';el.className='sd-toast';document.body.appendChild(el);}
  el.textContent=msg; el.style.display='block';
  toastTimer=setTimeout(()=>{el.style.display='none';},2600);
}

// ── Resize ────────────────────────────────────────────────────────────────────
function onResizeH(e) {
  e.preventDefault();
  const y0=e.clientY, h0=S.resHeight;
  const mv=ev=>{S.resHeight=Math.max(96,Math.min(460,h0+(y0-ev.clientY)));const p=document.getElementById('sdResPanel');if(p)p.style.height=S.resHeight+'px';};
  const up=()=>{document.body.style.userSelect='';window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);persist();};
  document.body.style.userSelect='none'; window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}
function onResizeW(e) {
  e.preventDefault();
  const x0=e.clientX, w0=S.sideWidth;
  const mv=ev=>{S.sideWidth=Math.max(232,Math.min(440,w0+(ev.clientX-x0)));const a=document.getElementById('sdAside');if(a)a.style.width=S.sideWidth+'px';};
  const up=()=>{document.body.style.userSelect='';window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);persist();};
  document.body.style.userSelect='none'; window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
}

// ── Bindings ──────────────────────────────────────────────────────────────────
function bindRail() {
  document.getElementById('rNew')?.addEventListener('click',doNew);

// ── Actions ───────────────────────────────────────────────────────────────────
function doNew()   { S.activeId=null; S.draft=''; renderAll(); document.getElementById('composerTA')?.focus(); }
function doClear() { S.chats=[]; S.activeId=null; persist(); renderAll(); }
function doSelect(id) { S.activeId=id; renderMain(); scrollBottom(); }
function doExpand()   { S.collapsed=false; persist(); renderSidebar(); }
function doDelete(id) { S.chats=S.chats.filter(c=>c.id!==id); if(S.activeId===id)S.activeId=null; persist(); renderAll(); }

async function doSend(textArg) {
  const text = typeof textArg==='string' ? textArg.trim() : S.draft.trim();
  if (!text || S.busy) return;

  const isNew = !S.activeId;
  const id    = isNew ? uid() : S.activeId;
  const userMsg = { role:'user', content:text };

  if (isNew) {
    const title = text.length>38 ? text.slice(0,38).trim()+'…' : text;
    S.chats = [{ id, title, updated:'Just now', messages:[userMsg] }, ...S.chats];
    S.activeId = id;
  } else {
    S.chats = S.chats.map(c=>c.id===id ? {...c, messages:[...c.messages,userMsg], updated:'Just now'} : c);
  }

  S.draft=''; S.busy=true; persist(); renderAll(); scrollBottom();

  // Build API messages — convert stored messages to Claude format
  const chat = S.chats.find(c=>c.id===id);
  const apiMsgs = (chat?.messages||[]).map(m=>({
    role:    m.role==='assistant' ? 'assistant' : 'user',
    content: m.role==='assistant' ? blocksToText(m.blocks) : (m.content||m.text||''),
  })).filter(m=>m.content);

  // Add a live, streaming assistant message and fill it in as chunks arrive.
  const reply = { role:'assistant', badge:null, blocks:[], streaming:true };
  S.chats = S.chats.map(c=>c.id===id ? {...c, messages:[...c.messages,reply], updated:'Just now'} : c);

  function liveMsg(){ const c=S.chats.find(x=>x.id===id); return c && c.messages[c.messages.length-1]; }
  function apply(data){ const msg=liveMsg(); if(!msg) return;
    if(data.badge) msg.badge=data.badge; if(data.blocks) msg.blocks=data.blocks;
    renderMain(); scrollBottom(); }

  try {
    const res = await fetch('/api/chat/stream', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages:apiMsgs}) });
    if (!res.ok || !res.body) {
      let msg='stream failed'; try{ const j=await res.json(); if(j.error) msg=j.error; }catch(e){}
      throw new Error(msg);
    }
    const reader = res.body.getReader(), dec = new TextDecoder();
    let buf='';
    for(;;){
      const {value, done} = await reader.read();
      if(done) break;
      buf += dec.decode(value, {stream:true});
      let sep;
      while((sep = buf.indexOf('\n\n')) >= 0){
        const raw = buf.slice(0, sep); buf = buf.slice(sep+2);
        let ev='message', dataStr='';
        for(const line of raw.split('\n')){
          if(line.startsWith('event:')) ev=line.slice(6).trim();
          else if(line.startsWith('data:')) dataStr += line.slice(5).trimStart();
        }
        if(!dataStr) continue;
        let obj; try{ obj=JSON.parse(dataStr); }catch(e){ continue; }
        if(ev==='error') throw new Error(obj.error||'stream error');
        apply(obj);   // 'message' (partial) and 'done' (final) both carry {badge,blocks}
      }
    }
    const msg=liveMsg();
    if(msg){ if(!msg.blocks || !msg.blocks.length){ msg.blocks=[{type:'p', text:'No answer was produced. Please try again.'}]; } delete msg.streaming; }
  } catch(err) {
    const msg=liveMsg();
    if(msg){ if(!msg.blocks || !msg.blocks.length){ msg.badge=null; msg.blocks=[{type:'p', text:'Something went wrong. Please try again.'}]; } delete msg.streaming; }
  }

  S.busy=false; persist(); renderAll(); scrollBottom();
}

loadState();

document.getElementById('sideToggle').addEventListener('click',()=>{S.collapsed=!S.collapsed;persist();renderSidebar();});

const ta = document.getElementById('composerTA');

// ── Voice input (Web Speech API — free, in-browser; Chrome/Edge) ─────────────
(function(){
  const micBtn=document.getElementById('micBtn'), langToggle=document.getElementById('langToggle');
  const hint=document.querySelector('.sd-composer-hint');
  const hintText = hint ? hint.textContent : '';
  const canRecord = !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder);
  let speechLang = localStorage.getItem('sd_speech_lang') || 'en';
  let recorder=null, mediaStream=null, chunks=[], recording=false;

  function renderLang(){ langToggle.textContent = (speechLang==='hi') ? 'हिं' : 'EN'; }
  renderLang();
  langToggle.addEventListener('click',()=>{
    speechLang = (speechLang==='hi') ? 'en' : 'hi';
    localStorage.setItem('sd_speech_lang', speechLang);
    renderLang();
    showToast(speechLang==='hi' ? 'Voice input: Hindi' : 'Voice input: English');
  });

  if(!canRecord){
    micBtn.addEventListener('click',()=>showToast(
      window.isSecureContext ? 'Voice input needs Chrome or Edge.'
                             : 'Voice input needs HTTPS or localhost.'));
    return;
  }

  function setRecUI(on){
    recording=on;
    micBtn.classList.toggle('sd-mic-on',on);
    micBtn.title = on ? 'Listening… click to stop' : 'Speak your question';
    if(hint){
      hint.textContent = on ? 'Listening… click the mic again to stop' : hintText;
      hint.classList.toggle('sd-listening',on);
    }
  }

  async function transcribe(blob){
    const fd=new FormData();
    fd.append('audio', blob, 'speech.webm');
    fd.append('lang', speechLang);   // 'en' | 'hi'
    if(hint){ hint.textContent='Transcribing…'; hint.classList.add('sd-listening'); }
    try{
      const res=await fetch('/api/transcribe',{method:'POST',body:fd});
      const data=await res.json();
      if(!res.ok || data.error){ showToast('Transcription failed: '+(data.error||res.status)); return; }
      const text=(data.text||'').trim();
      if(!text){ showToast('Didn\'t catch that — try again.'); return; }
      ta.value = (ta.value ? ta.value.trim()+' ' : '') + text;
      ta.dispatchEvent(new Event('input'));   // enable Ask + auto-resize
    }catch(err){ showToast('Transcription failed: '+err.message); }
    finally{ if(hint){ hint.textContent=hintText; hint.classList.remove('sd-listening'); } ta.focus(); }
  }

  async function startRec(){
    try{
      mediaStream = await navigator.mediaDevices.getUserMedia({audio:true});
    }catch(err){
      showToast(err.name==='NotAllowedError'
        ? 'Microphone blocked — allow mic access for this site, then try again.'
        : 'Could not start mic: '+err.message);
      return;
    }
    chunks=[];
    recorder = new MediaRecorder(mediaStream);
    recorder.ondataavailable = e=>{ if(e.data && e.data.size) chunks.push(e.data); };
    recorder.onstop = ()=>{
      if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; }
      setRecUI(false);
      const blob=new Blob(chunks,{type:recorder.mimeType||'audio/webm'});
      if(blob.size>0) transcribe(blob);
    };
    recorder.start();
    setRecUI(true);
  }

  micBtn.addEventListener('click',()=>{
    if(recording){ recorder && recorder.state!=='inactive' && recorder.stop(); return; }
    startRec();
  });
})();

// ── Feedback (thumbs up/down + remark) ───────────────────────────────────────
document.addEventListener('click', e=>{
  const up=e.target.closest('.sd-fb-up'), down=e.target.closest('.sd-fb-down');
  if(up)        submitFeedback(+up.dataset.midx,'up');
  else if(down) openRemark(down);
});
function openRemark(btn){
  const bar=btn.closest('.sd-fb'); if(!bar) return;
  const i=+btn.dataset.midx;
  bar.innerHTML=`<div class="sd-fb-form">
    <textarea class="sd-fb-text" placeholder="What was wrong or missing? (optional)"></textarea>
    <div class="sd-fb-actions">
      <button class="sd-fb-cancel" type="button">Cancel</button>
      <button class="sd-fb-submit" type="button">Submit</button>
    </div></div>`;
  const txt=bar.querySelector('.sd-fb-text'); txt.focus();
  bar.querySelector('.sd-fb-cancel').onclick=()=>renderMain();
  bar.querySelector('.sd-fb-submit').onclick=()=>submitFeedback(i,'down',txt.value.trim());
}
async function submitFeedback(i, rating, remark){
  const chat=S.chats.find(c=>c.id===S.activeId);
  if(!chat||!chat.messages[i]) return;
  const m=chat.messages[i];
  let q='';
  for(let k=i-1;k>=0;k--){ if(chat.messages[k].role==='user'){ q=chat.messages[k].content||chat.messages[k].text||''; break; } }
  m.feedback=rating; persist(); renderMain();
  showToast(rating==='up'?'Thanks for the feedback!':'Thanks — feedback noted.');
  try{
    await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({rating, question:q, answer:blocksToText(m.blocks||[]), remark:remark||''})});
  }catch(e){}
}

renderAll();
</script>
