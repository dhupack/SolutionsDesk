# Render deployment blueprint for SolutionsDesk (Flask RAG chatbot).
# Single worker: the RAG model + FAISS indexes load once at boot into the
# global `rag` object, so multiple workers would multiply memory use.
# Threads + long timeout keep the SSE /api/chat/stream endpoint alive.
services:
  - type: web
    name: solutionsdesk
    runtime: python
    plan: free               # 512MB RAM; spins down after ~15min idle (cold start ~30-60s). OpenAI provider keeps us under the limit
    buildCommand: pip install -r requirements.txt
    # --max-requests recycles the single worker every ~100 requests (jittered) so any
    # slow memory growth is reclaimed — important to stay under the 512MB free-tier cap.
    startCommand: gunicorn app_new:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 --max-requests 100 --max-requests-jitter 20
    healthCheckPath: /health
    envVars:
      - key: EMBEDDING_PROVIDER   # committed FAISS indexes were built with OpenAI embeddings
        value: openai
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY       # set in the Render dashboard (do not commit)
        sync: false
      - key: OPENAI_EMBEDDING_MODEL   # must match the model the committed FAISS indexes were built with (3072-dim)
        value: text-embedding-3-large
      - key: FLASK_SECRET_KEY     # generate a random value in the dashboard
        sync: false
      - key: RELOAD_TOKEN         # protects /api/reload-catalog
        sync: false
